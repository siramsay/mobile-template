  <link rel="stylesheet" href="style.css">
  <title>Creating a Basic Mobile Menu Using JavaScript.</title>
  <meta name="description" content="This page demonstrates the a basic mobile menu.">

  <!-- Matomo -->
  <script>
    var _paq = window._paq = window._paq || [];
    /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
    _paq.push(["setExcludedQueryParams", ["\/admin","\/admin\/*"]]);
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
    (function() {
      var u="https://dealu.net/matomo/";
      _paq.push(['setTrackerUrl', u+'matomo.php']);
      _paq.push(['setSiteId', '1']);
      var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
      g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
    })();
  </script>
  <!-- End Matomo Code -->

</head>

<body>

<main>
  <h1>Basic Mobile Menu Demonstration</h1>
  <p>This is a demo for a mobile menu. You can find more out in the article <a href="https://designkojo.com/making-a-mobile-menu-part-2-make-it-shine-accessibility-and-ux">Creating a Basic Mobile Menu Using JavaScript.</a></p>

  <article>
    <iframe sandbox="allow-same-origin allow-scripts"
            src="https://designkojo.com/demos/basic-mobile-menu/index.html"
            height="812"
            width="375"></iframe>
  </article>

</main>
